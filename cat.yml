---
- name: Install and Configure Catalogue
  hosts: catalogue
  become: yes

  tasks:
    - name: Disable Default NodeJS
      shell: dnf module disable nodejs -y

    - name: Enable NodeJS 20
      shell: dnf module enable nodejs:20 -y

    - name: Install NodeJS
      dnf:
        name: nodejs
        state: present

    - name: Create Roboshop User
      user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"
        create_home: yes
      ignore_errors: yes

    - name: Create App Directory
      file:
        path: /app
        state: directory

    - name: Download Catalogue Code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: Remove Old Code
      file:
        path: /app
        state: absent

    - name: Recreate App Directory
      file:
        path: /app
        state: directory

    - name: Unzip Catalogue Code
      unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: Install Dependencies
      npm:
        path: /app

    - name: Copy Catalogue Service
      template:
        src: catalogue.service.j2
        dest: /etc/systemd/system/catalogue.service

    - name: Reload Daemon
      systemd:
        daemon_reload: yes

    - name: Start and Enable Catalogue
      service:
        name: catalogue
        state: started
        enabled: yes

    - name: Copy Mongo Repo
      copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: Install MongoDB Client
      dnf:
        name: mongodb-mongosh
        state: present

    - name: Check If Data Already Loaded
      command: mongosh --host {{ MONGODB_HOST }} --quiet --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: db_index

    - name: Load Master Data
      shell: mongosh --host {{ MONGODB_HOST }} < /app/db/master-data.js
      when: db_index.stdout | int <= 0

    - name: Restart Catalogue
      service:
        name: catalogue
        state: restarted