---
- name: Install and Configure Cart Service
  hosts: cart
  become: yes

  tasks:
    - name: Disable Default NodeJS
      command: dnf module disable nodejs -y

    - name: Enable NodeJS 20
      command: dnf module enable nodejs:20 -y

    - name: Install NodeJS
      dnf:
        name: nodejs
        state: present

    - name: Create Roboshop User
      user:
        name: roboshop
        system: yes
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"
        create_home: yes
      ignore_errors: yes

    - name: Create App Directory
      file:
        path: /app
        state: directory

    - name: Download Cart Code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
        dest: /tmp/cart.zip

    - name: Remove Old Code
      file:
        path: /app
        state: absent

    - name: Recreate App Directory
      file:
        path: /app
        state: directory

    - name: Unzip Cart Code
      unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes

    - name: Install Dependencies
      npm:
        path: /app

    - name: Copy Cart Service
      template:
        src: cart.service.j2
        dest: /etc/systemd/system/cart.service

    - name: Reload Daemon
      systemd:
        daemon_reload: yes

    - name: Start and Enable Cart Service
      service:
        name: cart
        state: started
        enabled: yes

    - name: Restart Cart Service
      service:
        name: cart
        state: restarted